<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi SDN Wawonggole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .figma-card { border-radius: 24px; }
        .figma-shadow { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.1), 0 8px 10px -6px rgba(79, 70, 229, 0.1); }
        #reader { width: 100% !important; border: none !important; border-radius: 20px; overflow: hidden; }
        .nav-active { color: #4f46e5; font-weight: 800; }
        input::placeholder { color: #cbd5e1; font-weight: 500; }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-[390px] min-h-screen bg-[#FAF9FF] relative flex flex-col">
        
        <!-- HALAMAN LOGIN -->
        <div id="login-page" class="flex-1 p-8 flex flex-col justify-center">
            <div class="text-center mb-12">
                <div class="w-20 h-20 bg-indigo-600 rounded-[28px] flex items-center justify-center mx-auto mb-8 figma-shadow">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase mb-1">SDN WAWONGGOLE</h1>
                <p class="text-slate-500 text-sm font-semibold italic">Welcome to Presensi Digital</p>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-2 rounded-3xl border border-slate-100 shadow-sm focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                    <input type="email" id="email" placeholder="Email Guru" class="w-full p-4 bg-transparent outline-none text-sm font-bold text-slate-700">
                </div>
                <div class="bg-white p-2 rounded-3xl border border-slate-100 shadow-sm focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                    <input type="password" id="password" placeholder="Password (Tgl Lahir)" class="w-full p-4 bg-transparent outline-none text-sm font-bold text-slate-700">
                </div>
                <button id="btn-login" class="w-full bg-indigo-600 text-white font-extrabold py-5 rounded-3xl figma-shadow active:scale-[0.97] transition-all mt-4 tracking-wider text-sm">
                    MASUK SEKARANG
                </button>
            </div>

            <p class="text-center text-[10px] text-slate-300 mt-12 font-bold uppercase tracking-widest">v2.0 • Secured by Firebase</p>
        </div>

        <!-- HALAMAN DASHBOARD -->
        <div id="main-page" class="hidden flex-1 flex flex-col p-6 pb-32">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Selamat Datang,</p>
                    <h2 id="display-name" class="text-xl font-black text-slate-800">Memuat...</h2>
                </div>
                <button id="btn-logout" class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm text-rose-500 active:scale-90 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>

            <!-- CARD UTAMA -->
            <div id="home-view" class="space-y-6">
                <div class="bg-indigo-600 p-8 figma-card text-white figma-shadow relative overflow-hidden">
                    <div class="relative z-10 text-center">
                        <p id="today-text" class="text-[10px] font-black uppercase tracking-[0.2em] opacity-60 mb-6"></p>
                        <button id="btn-scan" class="w-24 h-24 bg-white/20 rounded-full mx-auto flex items-center justify-center border-4 border-white/40 shadow-inner mb-6 active:scale-90 transition-all">
                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-indigo-600 shadow-xl">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4 7 4 4 7 4"/><polyline points="20 7 20 4 17 4"/><polyline points="7 20 4 20 4 17"/><polyline points="17 20 20 20 20 17"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
                            </div>
                        </button>
                        <p class="text-xs font-bold tracking-wide">Ketuk untuk Scan QR</p>
                    </div>
                    <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                </div>

                <div id="scanner-box" class="hidden">
                    <div id="reader" class="figma-shadow border-4 border-white"></div>
                    <button id="btn-cancel" class="w-full py-4 text-slate-400 text-xs font-black uppercase tracking-widest mt-2">Batalkan Kamera</button>
                </div>

                <!-- RIWAYAT HARI INI -->
                <div class="bg-white p-6 figma-card border border-slate-50 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Status Kehadiran</h3>
                        <span id="status-chip" class="text-[9px] font-black bg-slate-100 text-slate-400 px-3 py-1 rounded-full uppercase">Belum Absen</span>
                    </div>
                    <div id="status-content" class="text-center py-4 text-slate-300 italic text-sm">
                        Silakan lakukan scan QR presensi.
                    </div>
                </div>
            </div>

            <!-- VIEW LAPORAN (Khusus Admin) -->
            <div id="report-view" class="hidden space-y-4">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-1 h-6 bg-indigo-600 rounded-full"></div>
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">Rekap Absensi Guru</h3>
                </div>
                <div id="report-list" class="space-y-3">
                    <!-- Data rekap -->
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div id="bottom-nav" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[340px] bg-white/80 backdrop-blur-xl h-20 rounded-[32px] border border-white/50 shadow-2xl flex items-center justify-around px-4 z-50">
            <button id="nav-home" class="flex flex-col items-center nav-active transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                <span class="text-[9px] mt-1 uppercase font-black">Beranda</span>
            </button>
            <button id="nav-report" class="flex flex-col items-center text-slate-300 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="11" y2="17"/></svg>
                <span class="text-[9px] mt-1 uppercase font-black">Laporan</span>
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4KhBeNDfiP-rzI16qdBz8J2InbrWrgOM",
            authDomain: "absen-qr-sdn-wawonggole.firebaseapp.com",
            databaseURL: "https://absen-qr-sdn-wawonggole-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "absen-qr-sdn-wawonggole",
            storageBucket: "absen-qr-sdn-wawonggole.appspot.com",
            messagingSenderId: "364506822262",
            appId: "1:364506822262:web:75704177d337d115e61d36"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let scanner = null;
        let userData = null;

        const show = (id) => document.getElementById(id).classList.remove('hidden');
        const hide = (id) => document.getElementById(id).classList.add('hidden');

        document.getElementById('today-text').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if(!email || !pass) return alert("Mohon masukkan email dan password!");
            
            document.getElementById('btn-login').innerText = "MENGECEK...";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                alert("Login Gagal: Email atau Password tidak valid!");
                document.getElementById('btn-login').innerText = "MASUK SEKARANG";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                hide('login-page');
                show('main-page');
                show('bottom-nav');
                
                const snap = await get(ref(db, `users/${user.uid}`));
                userData = snap.exists() ? snap.val() : { nama: user.email, role: 'guru' };
                document.getElementById('display-name').innerText = userData.nama;
                
                if(userData.role === 'admin') {
                    show('nav-report');
                    loadAdminReports();
                } else {
                    hide('nav-report');
                }
                
                checkAttendance();
            } else {
                show('login-page');
                hide('main-page');
                hide('bottom-nav');
            }
        });

        document.getElementById('btn-logout').onclick = () => { if(confirm("Anda yakin ingin keluar?")) signOut(auth); };

        document.getElementById('btn-scan').onclick = () => {
            show('scanner-box');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                if(text === "SDN_WAWONGGOLE_HADIR") {
                    saveAttendance();
                    stopScan();
                } else {
                    alert("QR Code tidak valid!");
                    stopScan();
                }
            }).catch(err => alert("Kamera tidak dapat diakses: " + err));
        };

        const stopScan = () => { if(scanner) { scanner.stop().then(() => hide('scanner-box')); } };
        document.getElementById('btn-cancel').onclick = stopScan;

        async function saveAttendance() {
            const today = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            try {
                await set(ref(db, `absensi/${today}/${auth.currentUser.uid}`), {
                    nama: userData.nama,
                    waktu: time,
                    status: 'Hadir'
                });
                alert("Berhasil! Kehadiran Anda hari ini telah dicatat.");
                checkAttendance();
            } catch (e) { alert("Terjadi kesalahan sistem: " + e.message); }
        }

        async function checkAttendance() {
            const today = new Date().toISOString().split('T')[0];
            onValue(ref(db, `absensi/${today}/${auth.currentUser.uid}`), (snap) => {
                if(snap.exists()) {
                    const d = snap.val();
                    const chip = document.getElementById('status-chip');
                    chip.innerText = "Sudah Hadir";
                    chip.className = "text-[9px] font-black bg-green-100 text-green-600 px-3 py-1 rounded-full uppercase";
                    document.getElementById('status-content').innerHTML = `
                        <div class="text-3xl font-black text-indigo-600 tracking-tight">${d.waktu}</div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">WITA • PRESENSI BERHASIL</div>
                    `;
                }
            });
        }

        document.getElementById('nav-home').onclick = () => {
            show('home-view'); hide('report-view');
            document.getElementById('nav-home').classList.add('nav-active');
            document.getElementById('nav-report').classList.remove('nav-active');
            document.getElementById('nav-report').classList.add('text-slate-300');
        };

        document.getElementById('nav-report').onclick = () => {
            hide('home-view'); show('report-view');
            document.getElementById('nav-report').classList.add('nav-active');
            document.getElementById('nav-report').classList.remove('text-slate-300');
            document.getElementById('nav-home').classList.remove('nav-active');
            document.getElementById('nav-home').classList.add('text-slate-300');
        };

        function loadAdminReports() {
            onValue(ref(db, 'absensi'), (snap) => {
                const list = document.getElementById('report-list');
                list.innerHTML = "";
                if(snap.exists()) {
                    const allData = snap.val();
                    Object.keys(allData).reverse().forEach(tgl => {
                        const dateObj = new Date(tgl);
                        const formattedDate = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                        list.innerHTML += `<div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-6 mb-2 ml-1 italic">${formattedDate}</div>`;
                        Object.keys(allData[tgl]).forEach(uid => {
                            const d = allData[tgl][uid];
                            list.innerHTML += `
                                <div class="bg-white p-5 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50">
                                    <div>
                                        <div class="font-bold text-slate-800 text-sm leading-tight">${d.nama}</div>
                                        <div class="text-[9px] font-bold text-green-500 uppercase tracking-tighter mt-0.5">Sudah Presensi</div>
                                    </div>
                                    <div class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">${d.waktu}</div>
                                </div>`;
                        });
                    });
                } else {
                    list.innerHTML = "<p class='text-slate-400 text-xs italic text-center mt-10'>Belum ada data absensi yang tercatat.</p>";
                }
            });
        }
    </script>
</body>
</html>
