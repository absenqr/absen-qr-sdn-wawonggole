<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi SDN Wawonggole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #5851DB; 
            --bg-figma: #FAF9FF; 
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #E2E8F0; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Simulasi Kanvas Mobile */
        .mobile-canvas {
            background-color: var(--bg-figma);
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            height: 100%;
            position: relative;
            overflow-x: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.15);
        }

        .figma-card { border-radius: 2.5rem; }
        .figma-shadow { box-shadow: 0 20px 40px -10px rgba(88, 81, 219, 0.15); }
        
        .active-tab { color: var(--primary); }
        .inactive-tab { color: #CBD5E1; }

        .page-enter { animation: figmaSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes figmaSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-curved {
            border-radius: 2.5rem 2.5rem 0 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            max-width: 390px;
        }

        .custom-input {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
            width: 100%;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(88, 81, 219, 0.1);
        }
        .custom-input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 1.25rem;
            border-radius: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 30px rgba(88, 81, 219, 0.3);
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div class="mobile-canvas flex flex-col">
        
        <!-- ================= SCREEN: AUTH (LOGIN) ================= -->
        <section id="screen-auth" class="flex-1 flex flex-col items-center justify-center p-8 page-enter">
            
            <!-- Judul Teks (Gambar Dihapus) -->
            <div class="text-center mb-12">
                <h1 class="text-[32px] font-extrabold tracking-tight text-slate-900 leading-tight">
                    E-Presensi Guru<br>
                    <span class="text-[#5851DB]">SDN WAWONGGOLE</span>
                </h1>
                <p class="text-[#94a3b8] font-bold mt-4 text-[10px] uppercase tracking-[0.3em]">
                    Sistem Digital Kehadiran
                </p>
            </div>
            
            <!-- Form Login -->
            <div class="w-full max-w-[320px] space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1.5 block tracking-widest">Email</label>
                    <input type="email" id="login-email" placeholder="Alamat Email" class="custom-input">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1.5 block tracking-widest">Pin</label>
                    <input type="password" id="login-pass" placeholder="6 digit PIN" class="custom-input">
                </div>
                <div class="pt-4">
                    <button onclick="handleLogin()" class="btn-primary">
                        Masuk Sekarang
                    </button>
                </div>
            </div>
            
        </section>

        <!-- ================= SCREEN: HOME ================= -->
        <section id="screen-home" class="hidden flex-1 p-6 pb-36 page-enter">
            <header class="flex justify-between items-center mb-8 mt-4 px-2">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-xl shadow-sm border border-slate-100">🏫</div>
                    <div>
                        <h2 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Guru Terverifikasi</h2>
                        <p id="user-display" class="text-sm font-extrabold text-slate-900 tracking-tight leading-tight">Memuat...</p>
                    </div>
                </div>
                <button class="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-slate-100 shadow-sm">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </button>
            </header>

            <div class="bg-[#5851DB] p-8 figma-card text-white figma-shadow relative overflow-hidden mb-8">
                <div class="absolute right-0 top-0 w-32 h-32 bg-white opacity-5 rounded-full -mr-10 -mt-10"></div>
                <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest mb-2">Kehadiran Hari Ini</p>
                <div class="flex justify-between items-end relative z-10">
                    <p id="status-label" class="text-2xl font-black italic tracking-tighter uppercase">Belum Absen</p>
                    <div class="text-[8px] font-black opacity-50 uppercase tracking-tighter text-right">
                        SDN<br>WAWONGGOLE
                    </div>
                </div>
            </div>

            <div class="text-center py-6">
                <div onclick="startScanner()" class="w-32 h-32 bg-white rounded-full mx-auto flex items-center justify-center shadow-2xl shadow-indigo-100 mb-6 cursor-pointer active:scale-90 transition-all border-[10px] border-indigo-50 relative group">
                    <div class="absolute inset-0 bg-[#5851DB] rounded-full scale-[0.82] flex items-center justify-center">
                        <span class="text-3xl font-black italic text-white tracking-tighter">GO</span>
                    </div>
                </div>
                <h3 class="text-lg font-extrabold text-slate-800 tracking-tight">Presensi QR Code</h3>
                <p class="text-slate-400 text-[10px] mt-1 font-bold uppercase tracking-widest">Arahkan kamera ke kode</p>
            </div>

            <div class="mt-8 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h4 class="text-[10px] font-black text-slate-900 uppercase tracking-[0.2em]">Aktivitas Terakhir</h4>
                    <span class="text-[10px] font-bold text-indigo-600 uppercase">Detail</span>
                </div>
                <div id="home-history" class="space-y-3"></div>
            </div>
        </section>

        <!-- ================= SCREEN: REPORT ================= -->
        <section id="screen-report" class="hidden flex-1 p-6 pb-36 page-enter">
            <h2 class="text-2xl font-black text-slate-900 mb-8 mt-4 tracking-tighter uppercase">Laporan Presensi</h2>
            <div id="report-container" class="space-y-3"></div>
        </section>

        <!-- ================= SCREEN: PROFILE ================= -->
        <section id="screen-profile" class="hidden flex-1 p-6 pb-36 page-enter text-center">
            <div class="mt-12">
                <div class="w-32 h-32 bg-white rounded-[3rem] mx-auto flex items-center justify-center text-5xl mb-6 border-4 border-white shadow-xl shadow-slate-100">👤</div>
                <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">SDN WAWONGGOLE</h2>
                <p id="profile-email" class="text-slate-400 font-bold mb-10 text-[10px] tracking-[0.2em] uppercase opacity-60">Admin@Sekolah.id</p>
                <div class="px-4">
                    <button onclick="handleLogout()" class="w-full p-5 bg-red-50 text-red-600 rounded-3xl font-black uppercase text-[10px] tracking-widest active:bg-red-100 transition-all border border-red-100">
                        Keluar Aplikasi
                    </button>
                </div>
            </div>
        </section>

        <!-- ================= BOTTOM NAVIGATION ================= -->
        <nav id="bottom-nav" class="hidden fixed bottom-0 left-1/2 -translate-x-1/2 w-full nav-curved shadow-[0_-15px_30px_rgba(0,0,0,0.03)] p-5 pb-8 flex justify-around items-center z-40">
            <button onclick="switchTab('home')" class="flex flex-col items-center gap-1 active-tab" id="btn-home">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Beranda</span>
            </button>
            <button onclick="switchTab('report')" class="flex flex-col items-center gap-1 inactive-tab" id="btn-report">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Laporan</span>
            </button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1 inactive-tab" id="btn-profile">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Profil</span>
            </button>
        </nav>

        <!-- SCANNER UI -->
        <div id="scanner-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-50 flex flex-col">
            <div class="p-8 flex justify-between items-center text-white">
                <span class="font-black tracking-[0.3em] text-[8px] uppercase opacity-40">Scan Protocol V1</span>
                <button onclick="stopScanner()" class="bg-white/10 px-5 py-2 rounded-xl text-[8px] font-black uppercase border border-white/10 tracking-widest">Batal</button>
            </div>
            <div class="flex-1 flex items-center justify-center p-12">
                <div id="qr-reader" class="w-full aspect-square rounded-[3rem] overflow-hidden border-4 border-white/5 relative bg-zinc-900"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4KHbeNdF1P-rzI16qdSzGJInbrWrgSM",
            authDomain: "absen-qr-sdn-wawonggole.firebaseapp.com",
            databaseURL: "https://absen-qr-sdn-wawonggole-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "absen-qr-sdn-wawonggole",
            appId: "1:777561852077:web:65819714856f9168175f3a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let html5QrCode = null;

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return;
            signInWithEmailAndPassword(auth, email, pass).catch(e => console.error("Login Error"));
        };

        window.handleLogout = () => { signOut(auth); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('profile-email').innerText = user.email.toUpperCase();
                switchTab('home');
                const snap = await get(ref(db, `users/${user.uid}`));
                document.getElementById('user-display').innerText = snap.exists() ? snap.val().nama : "Guru Terhormat";
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.add('hidden');
                ['home', 'report', 'profile'].forEach(t => document.getElementById(`screen-${t}`).classList.add('hidden'));
            }
        });

        window.switchTab = (tab) => {
            ['home', 'report', 'profile'].forEach(t => {
                document.getElementById(`screen-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.replace('active-tab', 'inactive-tab');
            });
            document.getElementById(`screen-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.replace('inactive-tab', 'active-tab');
            if(tab === 'report') fetchReport();
            if(tab === 'home') fetchHistory();
        };

        window.startScanner = () => {
            document.getElementById('scanner-modal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 24, qrbox: 220 }, (text) => {
                if(text === "SDN_WAWONGGOLE_HADIR") { submitAbsen(); stopScanner(); }
            }).catch(e => console.error(e));
        };

        window.stopScanner = () => {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('scanner-modal').classList.add('hidden');
                html5QrCode = null;
            });
            else document.getElementById('scanner-modal').classList.add('hidden');
        };

        async function submitAbsen() {
            const user = auth.currentUser;
            const now = new Date();
            const tgl = now.toISOString().split('T')[0];
            const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const nama = document.getElementById('user-display').innerText;
            await set(ref(db, `absensi/${tgl}/${user.uid}`), { nama, waktu: jam });
            document.getElementById('status-label').innerText = "HADIR: " + jam;
        }

        function fetchHistory() {
            const user = auth.currentUser;
            onValue(ref(db, 'absensi'), (snap) => {
                const container = document.getElementById('home-history');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.keys(snap.val()).reverse().slice(0, 3).forEach(tgl => {
                        if(snap.val()[tgl][user.uid]) {
                            const d = snap.val()[tgl][user.uid];
                            container.innerHTML += `
                                <div class="bg-white p-5 figma-card border border-slate-50 figma-shadow flex justify-between items-center">
                                    <div>
                                        <p class="text-[10px] font-black text-slate-900 tracking-tight">${tgl}</p>
                                        <p class="text-[8px] text-slate-300 font-bold uppercase tracking-widest">Hadir Tepat Waktu</p>
                                    </div>
                                    <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">${d.waktu}</span>
                                </div>`;
                        }
                    });
                }
            });
        }

        function fetchReport() {
            onValue(ref(db, 'absensi'), (snap) => {
                const container = document.getElementById('report-container');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.keys(snap.val()).reverse().forEach(tgl => {
                        container.innerHTML += `<div class="text-[8px] font-black text-indigo-400 uppercase tracking-[0.4em] mt-6 mb-2 px-2 italic">${tgl}</div>`;
                        Object.keys(snap.val()[tgl]).forEach(uid => {
                            const d = snap.val()[tgl][uid];
                            container.innerHTML += `
                                <div class="bg-white p-5 figma-card border border-slate-50 figma-shadow flex justify-between items-center mb-2">
                                    <p class="font-black text-slate-800 text-xs">${d.nama}</p>
                                    <div class="font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl text-[9px]">${d.waktu}</div>
                                </div>`;
                        });
                    });
                }
            });
        }
    </script>
</body>
</html>
